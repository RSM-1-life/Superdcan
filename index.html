<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Crypto Dust Scanner - Find Lost Coins</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Crypto Dust Scanner</h1>
            <p>Find forgotten crypto wallets & unclaimed rewards</p>
            <div class="stats" id="stats">
                <div class="stat-card">
                    <span class="stat-value" id="totalFound">0</span>
                    <span class="stat-label">Wallets Found</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="totalValue">$0</span>
                    <span class="stat-label">Total Value</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="lastScan">-</span>
                    <span class="stat-label">Last Scan</span>
                </div>
            </div>
        </header>

        <div class="filters">
            <select id="networkFilter">
                <option value="all">All Networks</option>
                <option value="ethereum">Ethereum</option>
                <option value="bsc">BSC</option>
            </select>
            <select id="daysFilter">
                <option value="30">30+ days inactive</option>
                <option value="90">90+ days inactive</option>
                <option value="180">180+ days inactive</option>
                <option value="365">365+ days inactive</option>
                <option value="730">730+ days inactive</option>
            </select>
            <input type="number" id="minBalance" placeholder="Min balance $" value="1">
            <button id="refreshBtn">🔄 Refresh</button>
        </div>

        <div class="wallets-list" id="walletsList">
            <div class="loading">Loading wallets...</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
